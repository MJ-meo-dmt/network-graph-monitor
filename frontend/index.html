<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Network Map</title>
<link rel="stylesheet" href="css/app.css">
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="panel" id="control-panel">
        <div class="panel-header">
            <div class="panel-title">Controls</div>
            <div class="muted" id="graph-view-state">zoom 1.00</div>
            <button class="panel-collapse" onclick="togglePanelCollapse(event, 'control-panel')">−</button>
        </div>

        <div class="panel-body">
            <div class="row control-group">
                <button onclick="saveCurrentLayoutAsDefault()">Save Layout</button>
                <button onclick="exportLayout()">Export Layout</button>
                <button onclick="importLayout()">Import Layout</button>
                <button onclick="fitGraph()">Fit</button>
                <button onclick="resetView()">Reset</button>
                <button onclick="centerOnSelected()">Center</button>
                <button id="pin-button" onclick="togglePinSelected()">Pin Selected</button>
                <button onclick="clearSelection()">Clear Selection</button>
            </div>
            <div class="row control-group">
                <button id="btn-start" class="primary" onclick="startCapture()">Start</button>
                <button id="btn-pause" onclick="pauseCapture()">Pause</button>
                <button id="btn-stop" class="danger" onclick="stopCapture()">Stop</button>
                <button onclick="newSession()">New Session</button>
            </div>

            <div id="capture-status" class="alert">[checking...]</div>

            <select id="session-select"></select>
            <button onclick="loadSelectedSession()">Load Session</button>
            <div id="session-status" class="muted">checking...</div>
        </div>
        <div class="resize-handle"></div>
    </div>

    <div class="panel" id="filter-panel">
        <div class="panel-header">
            <div class="panel-title">Filters</div>
            <button class="panel-collapse" onclick="togglePanelCollapse(event, 'filter-panel')">−</button>
        </div>

        <div class="panel-body">
            <div class="muted">Protocol filters</div>
            <div>
                <label class="proto-arp"><input type="checkbox" checked data-protocol="arp">ARP</label>
                <label class="proto-dns"><input type="checkbox" checked data-protocol="dns">DNS</label>
                <label class="proto-igmp"><input type="checkbox" checked data-protocol="igmp">IGMP</label>
                <label class="proto-ssdp"><input type="checkbox" checked data-protocol="ssdp">SSDP</label>
                <label class="proto-dhcp"><input type="checkbox" checked data-protocol="dhcp">DHCP</label>
                <label class="proto-netbios"><input type="checkbox" checked data-protocol="netbios">NetBIOS</label>
                <label class="proto-quic"><input type="checkbox" checked data-protocol="quic">QUIC</label>
                <label class="proto-tcp"><input type="checkbox" checked data-protocol="tcp">TCP</label>
                <label class="proto-udp"><input type="checkbox" checked data-protocol="udp">UDP</label>
                <label class="proto-icmp"><input type="checkbox" checked data-protocol="icmp">ICMP</label>
                <label class="proto-http"><input type="checkbox" checked data-protocol="http">HTTP</label>
                <label class="proto-tls"><input type="checkbox" checked data-protocol="tls">TLS</label>
                <label class="proto-scan"><input type="checkbox" checked data-protocol="scan">SCAN</label>
                <label class="proto-unknown"><input type="checkbox" checked data-protocol="mixed">Mixed</label>
                <label class="proto-unknown"><input type="checkbox" checked data-protocol="unknown">Other</label>
                <label><input type="checkbox" id="toggle-ipv6">Show IPv6</label>
            </div>

            <hr>

            <div class="muted">Search filters</div>
            <input id="filter-ip" placeholder="Filter IP e.g. 192.168.8.129">
            <input id="filter-port" placeholder="Filter port e.g. 443">
            <hr>

            <div class="muted">Edge display</div>
            <select id="edge-display-mode">
                <option value="normal">Normal edges</option>
                <option value="quiet">Quiet low-volume</option>
                <option value="usage">High Traffic Heatmap</option>
                <option value="top-5">Highlight top 5 talkers</option>
                <option value="top-10">Highlight top 10 talkers</option>
                <option value="top-20">Highlight top 20 talkers</option>
                <option value="backbone">Backbone emphasis</option>
            </select>
            <label>
            <input type="checkbox" id="show-edge-labels" checked>Show edge labels</label>
            <label><input type="checkbox" id="show-logical-edges" checked>Show logical edges</label>
            <label><input type="checkbox" id="show-gateway-to-external" checked>Show gateway → external</label>
            <label><input type="checkbox" id="show-external-to-gateway" checked>Show external → gateway</label>
        </div>

        <div class="resize-handle"></div>
    </div>

    <div class="panel" id="main-panel">
        <div class="panel-header">
            <div class="panel-title">Network Map</div>
            <button class="panel-collapse" onclick="togglePanelCollapse(event, 'main-panel')">−</button>
        </div>

        <div class="panel-body">
            <div id="status">Loading...</div>
            <hr>
            <div id="info">Click a node or edge.</div>
        </div>

        <div class="resize-handle"></div>
    </div>

    <div class="panel" id="stats-panel">
        <div class="panel-header">
            <div class="panel-title">Stats</div>
            <button class="panel-collapse" onclick="togglePanelCollapse(event, 'stats-panel')">−</button>
        </div>

        <div class="panel-body" id="stats-content">
            Waiting for packets...
        </div>

        <div class="resize-handle"></div>
    </div>

    <div class="panel" id="events-panel">
        <div class="panel-header">
            <div class="panel-title">Recent Packet Events</div>
            <div class="muted" id="events-count">0</div>
            <button class="panel-collapse" onclick="togglePanelCollapse(event, 'events-panel')">−</button>
        </div>

        <div class="panel-body" id="events-content">
            Waiting for events...
        </div>

        <div class="resize-handle"></div>
    </div>

<script src="js/state.js"></script>
<script src="js/utils.js"></script>
<script src="js/filters.js"></script>
<script src="js/panels.js"></script>
<script src="js/canvas.js"></script>
<script src="js/api.js"></script>
<script src="js/physics.js"></script>
<script src="js/render.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
